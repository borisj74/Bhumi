<!--
aesthetic_dna: Editorial Luxury / Brutalist Elegance. 
ui_paradigm: Asymmetric Editorial Scrolling Canvas.
palette_choice: Off-White Base (#F4F4F0), Near-Black Ink (#111111), Warm Muted Gold (#C5A880).
-->
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHUMI | High-End Fashion Agency</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,700;1,6..96,400;1,6..96,500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5.0.3/index.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/index.css" />
    <style>
        body {
            background-color: #F4F4F0;
            color: #111111;
            cursor: none;
        }

        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .text-outline {
            color: transparent;
            -webkit-text-stroke: 1px #111111;
        }
        
        .hover-underline {
            position: relative;
        }
        .hover-underline::after {
            content: '';
            position: absolute;
            width: 100%;
            transform: scaleX(0);
            height: 1px;
            bottom: 0;
            left: 0;
            background-color: #C5A880;
            transform-origin: bottom right;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .hover-underline:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        .cursor-dot, .cursor-outline {
            position: fixed;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 99999;
            pointer-events: none;
        }
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #C5A880;
        }
        .cursor-outline {
            width: 44px;
            height: 44px;
            border: 1px solid rgba(17, 17, 17, 0.35);
            transition: width 0.3s, height 0.3s, background-color 0.3s, border-color 0.3s;
        }

        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-100%); }
        }
        .animate-marquee {
            animation: marquee 25s linear infinite;
        }

        @keyframes slideDown {
            0% { transform: translateY(-100%); }
            50% { transform: translateY(0); }
            100% { transform: translateY(100%); }
        }
        .writing-vertical-rl { writing-mode: vertical-rl; }

        body.menu-open {
            overflow: hidden;
        }

        /* Always none — custom cursor tracks everywhere including over the open menu */
        *, *::before, *::after { cursor: none !important; }

        /*
          Header must sit above page layers (e.g. main z-50). Closed menu must not sit above
          the header in the stacking order — mix-blend / full-screen siblings caused missed clicks.
        */
        #site-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10000;
            isolation: isolate;
        }
        #site-menu:not(.menu-visible) {
            z-index: -1 !important;
            pointer-events: none !important;
        }
        #site-menu.menu-visible {
            z-index: 10050 !important;
            opacity: 1 !important;
            visibility: visible !important;
            pointer-events: auto !important;
        }

    </style>
</head>
<body class="font-sans antialiased text-ink relative selection:bg-gold selection:text-base">

    <div class="cursor-dot hidden md:block"></div>
    <div class="cursor-outline hidden md:block"></div>

    <!-- Scroll-linked vertical rail (React: ScrollProgressRail) -->
    <div id="scroll-progress-root"></div>

    <!-- Navigation (logo + menu same optical size; Geist sans) -->
    <nav id="site-header" class="fixed top-0 left-0 w-full p-6 md:p-12 flex justify-between items-start pointer-events-none text-gray-900">
        <div class="flex flex-col pointer-events-auto">
            <a href="index.html" class="font-sans text-xs tracking-widest uppercase text-gray-900 leading-none" aria-label="Home">Bhumi</a>
            <span id="site-nav-times" class="text-[10px] font-sans text-gray-600 hidden md:block mt-8 text-left" aria-live="polite">
                PARIS / <span id="site-time-paris">--:--</span><br>
                NY / <span id="site-time-ny">--:--</span>
            </span>
        </div>

        <div class="flex flex-col items-end gap-2 pointer-events-auto">
            <button type="button" id="menu-open" class="text-xs font-sans tracking-widest uppercase text-gray-900 hover:text-gold transition-colors duration-300" aria-expanded="false" aria-controls="site-menu">Menu [=]</button>
            <span class="text-[10px] font-sans text-gray-600 hidden md:block mt-8 text-right">
                PARIS / 48°52'5"N<br>
                NY / 40°42'46"N
            </span>
        </div>
    </nav>

    <!-- Full-screen menu -->
    <div id="site-menu" class="fixed inset-0 bg-white text-gray-900 flex flex-col opacity-0 invisible pointer-events-none transition-opacity duration-500 ease-expo" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="menu-heading">
        <div class="flex flex-col min-h-full p-6 md:p-12">
            <div class="flex justify-between items-start shrink-0">
                <a href="index.html" class="font-sans text-xs tracking-widest uppercase text-gray-900 leading-none" aria-label="Home">Bhumi</a>
                <button type="button" id="menu-close" class="text-xs font-sans tracking-widest uppercase text-gray-900 hover:text-gold transition-colors duration-300">Close [×]</button>
            </div>
            <nav class="flex-1 flex flex-col justify-center items-center gap-6 md:flex-row md:flex-wrap md:justify-center md:items-center md:gap-8 lg:gap-10 py-12" aria-label="Primary">
                <h2 id="menu-heading" class="sr-only">Site navigation</h2>
                <a href="/work.html" class="font-sans text-xs tracking-widest uppercase text-gray-900 hover:text-gold transition-colors">Work</a>
                <a href="/info.html" class="font-sans text-xs tracking-widest uppercase text-gray-900 hover:text-gold transition-colors">Info</a>
                <a href="/notes.html" class="font-sans text-xs tracking-widest uppercase text-gray-900 hover:text-gold transition-colors">Notes</a>
                <a href="mailto:studio@visage.agency" class="font-sans text-xs tracking-widest uppercase text-gray-900 hover:text-gold transition-colors">Contact</a>
            </nav>
        </div>
    </div>

    <!-- Statement — full viewport height; video + copy via React (ManifestoText) -->
    <section
        id="about"
        class="relative flex min-h-[100dvh] min-h-[100svh] flex-col justify-center overflow-hidden bg-base text-ink selection:bg-gold/25 selection:text-ink"
        style="color: #111827"
        aria-labelledby="manifesto-heading"
    >
        <h2 id="manifesto-heading" class="sr-only">Statement</h2>
        <div id="manifesto-text-root" class="w-full flex-1"></div>
    </section>

    <!-- Hero: scroll-linked image column (React: HomeScrollHero) -->
    <div id="home-scroll-hero-root"></div>

    <!-- Clients -->
    <section class="bg-base py-20 md:py-28 px-6 md:px-12" aria-labelledby="clients-heading">
        <h3 id="clients-heading" class="font-sans text-xs tracking-widest uppercase text-muted mb-12 md:mb-16">Selected Clients</h3>
        <div id="home-clients-root"></div>
    </section>

    <footer class="border-t border-ink/10 bg-base px-6 md:px-12 py-8 md:py-10" role="contentinfo" aria-label="Site footer">
        <div class="flex flex-col gap-8 md:flex-row md:items-end md:justify-between">
            <div class="font-sans text-xs tracking-widest uppercase text-gray-900">Bhumi</div>
            <nav class="flex flex-wrap gap-x-8 gap-y-3 font-sans text-xs tracking-widest uppercase" aria-label="Footer navigation">
                <a href="/work.html" class="text-muted hover:text-ink transition-colors">Work</a>
                <a href="/info.html" class="text-muted hover:text-ink transition-colors">Info</a>
                <a href="/notes.html" class="text-muted hover:text-ink transition-colors">Notes</a>
                <a href="mailto:studio@bhumi.agency" class="text-muted hover:text-ink transition-colors">Contact</a>
            </nav>
        </div>
        <p class="mt-6 font-sans text-[10px] tracking-widest uppercase text-muted">© 2026 Bhumi Studio</p>
    </footer>

    <script type="module" src="/src/main.tsx"></script>
    <script>
        const cursorDot = document.querySelector('.cursor-dot');
        const cursorOutline = document.querySelector('.cursor-outline');

        window.addEventListener('mousemove', function(e) {
            const posX = e.clientX;
            const posY = e.clientY;

            if(cursorDot) {
                cursorDot.style.left = `${posX}px`;
                cursorDot.style.top = `${posY}px`;
            }

            if(cursorOutline) {
                cursorOutline.animate({
                    left: `${posX}px`,
                    top: `${posY}px`
                }, { duration: 500, fill: "forwards" });
            }
        });

        const siteMenu = document.getElementById('site-menu');
        const menuOpenBtn = document.getElementById('menu-open');
        const menuCloseBtn = document.getElementById('menu-close');

        function openSiteMenu() {
            if (!siteMenu) return;
            siteMenu.classList.add('menu-visible');
            siteMenu.setAttribute('aria-hidden', 'false');
            document.body.classList.add('menu-open');
            menuOpenBtn?.setAttribute('aria-expanded', 'true');
            menuCloseBtn?.focus();
        }

        function closeSiteMenu() {
            if (!siteMenu) return;
            siteMenu.classList.remove('menu-visible');
            siteMenu.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('menu-open');
            menuOpenBtn?.setAttribute('aria-expanded', 'false');
            menuOpenBtn?.focus();
        }

        menuOpenBtn?.addEventListener('click', openSiteMenu);
        menuCloseBtn?.addEventListener('click', closeSiteMenu);
        siteMenu?.querySelectorAll('a[href]').forEach(function(link) {
            link.addEventListener('click', function() {
                closeSiteMenu();
            });
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && siteMenu?.classList.contains('menu-visible')) {
                closeSiteMenu();
            }
        });

    </script>
</body>
</html>
