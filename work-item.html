<html lang="en" class="scroll-smooth">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,700;1,6..96,400;1,6..96,500&display=swap" rel="stylesheet">

        *, *::before, *::after {
            cursor: none !important;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #F4F4F0;
            color: #111111;
            font-family: 'Geist Sans', sans-serif;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
        }

        body.grid-mode {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            height: auto;
            min-height: 100dvh;
        }

        ::-webkit-scrollbar { width: 0; background: transparent; }

        /* ─── Shared text style (matches nav/logo) ─── */
        .wi-label {
            font-family: 'Geist Sans', sans-serif;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #111111;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .wi-label:hover { color: #C5A880; }

        /* ─── Directional cursor (single view only) ─── */
        #work-cursor {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 99999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            font-family: 'Geist Sans', sans-serif;
            font-size: 18px;
            line-height: 1;
            color: #111111;
            transition: opacity 0.15s ease;
        }

        /* ─── Dot cursor (grid mode) ─── */
        #grid-cursor {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 99999;
            pointer-events: none;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: #C5A880;
            border-radius: 50%;
            transition: opacity 0.15s ease;
            opacity: 0;
        }

        body.grid-mode #work-cursor  { opacity: 0 !important; pointer-events: none; }
        body.grid-mode #grid-cursor  { opacity: 1; }
        body:not(.grid-mode) #grid-cursor { opacity: 0; }

        /* ─── Top nav ─── */
        #wi-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 1000;
            pointer-events: none;
        }
        @media (min-width: 768px) { #wi-nav { padding: 48px; } }
        #wi-nav a { pointer-events: auto; }

        /* ─── Single-view chrome: one horizontal band at viewport middle (editorial layout) ─── */
        #wi-single-chrome {
            position: fixed;
            left: 0;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
            padding: 0 24px;
            pointer-events: none;
        }
        @media (min-width: 768px) {
            #wi-single-chrome { padding: 0 48px; gap: 32px; }
        }

        .wi-single-left {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            align-items: flex-start;
        }
        /* Grid link, then image counter — all breakpoints */
        .wi-single-right {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: flex-start;
            gap: 0.5rem;
        }

        #wi-view-toggle {
            order: 1;
            position: static;
            background: none;
            border: none;
            padding: 0;
            cursor: none;
            pointer-events: auto;
        }

        #wi-counter {
            order: 2;
            font-family: 'Geist Sans', sans-serif;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #6b7280;
            white-space: nowrap;
        }

        /* Project meta: title → description → year — all breakpoints */
        #wi-project-meta {
            display: flex;
            flex-direction: column;
            flex-wrap: nowrap;
            align-items: flex-start;
            row-gap: 0.5rem;
            max-width: min(46vw, 520px);
            text-align: left;
        }
        #wi-project-title {
            order: 1;
            display: block;
            width: 100%;
            font-family: 'Geist Sans', sans-serif;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #111111;
            line-height: 1.35;
            margin: 0;
            font-weight: 400;
        }
        #wi-project-desc {
            order: 2;
            display: block;
            width: 100%;
            font-family: 'Geist Sans', sans-serif;
            font-size: 11px;
            line-height: 1.45;
            letter-spacing: 0.02em;
            color: #4b5563;
            font-weight: 400;
            margin: 0;
        }
        #wi-project-year {
            order: 3;
            display: block;
            width: 100%;
            font-family: 'Geist Sans', sans-serif;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #9ca3af;
            margin: 0;
        }

        /* Grid page: chrome becomes top block; only project copy (Grid + counter hidden) */
        body.grid-mode #wi-single-chrome {
            position: relative;
            top: auto;
            transform: none;
            display: block;
            flex: 0 0 auto;
            padding: 88px 24px 28px;
            z-index: auto;
        }
        @media (min-width: 768px) {
            body.grid-mode #wi-single-chrome { padding: 112px 48px 36px; }
        }
        body.grid-mode .wi-single-right { display: none; }
        body.grid-mode .wi-single-left { width: 100%; }
        body.grid-mode #wi-project-meta {
            max-width: none;
        }

        /* ─── Single image stage (centered; chrome sits on middle band above) ─── */
        #wi-stage {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }

        body.grid-mode #wi-stage {
            opacity: 0;
            pointer-events: none;
        }

        #wi-img {
            max-width: min(52vw, 720px);
            max-height: 78dvh;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            opacity: 1;
            transition: opacity 0.3s cubic-bezier(0.33, 0.12, 0.2, 1);
        }

        /* Mobile single view: image first, chrome below (stacking rules are global) */
        @media (max-width: 767px) {
            body:not(.grid-mode) {
                overflow-y: auto;
                overflow-x: hidden;
                height: auto;
                min-height: 100dvh;
                display: flex;
                flex-direction: column;
            }

            body:not(.grid-mode) #wi-stage {
                position: relative;
                inset: auto;
                flex: 0 0 auto;
                z-index: 1;
                min-height: 0;
                padding: 88px 20px 12px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            body:not(.grid-mode) #wi-img {
                max-width: min(88vw, 100%);
                max-height: min(52dvh, 420px);
            }

            body:not(.grid-mode) #wi-single-chrome {
                position: relative;
                top: auto;
                left: auto;
                right: auto;
                transform: none;
                flex: 0 0 auto;
                flex-direction: column;
                align-items: stretch;
                gap: 0.875rem;
                padding: 0 24px 32px;
                pointer-events: auto;
            }

            body:not(.grid-mode) .wi-single-left {
                width: 100%;
                align-items: flex-start;
            }

            body:not(.grid-mode) .wi-single-right {
                width: 100%;
                margin-left: 0;
            }

            body:not(.grid-mode) #wi-project-meta {
                max-width: 100%;
                width: 100%;
            }
        }

        #wi-img.is-fading { opacity: 0; }

        /* ─── Grid: work-sized thumbs, horizontally centered on the page ─── */
        #wi-grid {
            display: none;
            width: 100%;
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
            flex-wrap: wrap;
            align-items: flex-start;
            align-content: flex-start;
            justify-content: center;
            gap: 22px 16px;
            padding: 0 24px 72px;
            box-sizing: border-box;
        }
        @media (min-width: 768px) {
            #wi-grid { gap: 32px 26px; padding: 0 48px 96px; }
        }

        /* Fills space below meta; centers tile block vertically (equal space top/bottom when it fits) */
        body.grid-mode #wi-grid {
            flex: 1 1 auto;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            align-items: flex-start;
            justify-content: center;
            min-height: 0;
            margin-top: 0;
            padding: 24px;
        }
        @media (min-width: 768px) {
            body.grid-mode #wi-grid {
                gap: 32px 26px;
                padding: 32px 48px;
            }

        .wi-grid-item {
            flex: 0 0 auto;
            overflow: hidden;
            display: block;
            width: 100%;
            max-width: min(100%, 280px);
            margin-left: auto;
            margin-right: auto;
            aspect-ratio: 3 / 4;
        }
        @media (min-width: 768px) {
            .wi-grid-item {
                width: 40%;
                max-width: 200px;
            }
        }
        @media (min-width: 1280px) {
            .wi-grid-item {
                width: 38%;
                max-width: 220px;
            }
        }

        .wi-grid-item.wi-grid-item--xs {
            max-width: min(100%, 200px);
            aspect-ratio: 2 / 3;
        }
        @media (min-width: 768px) {
            .wi-grid-item.wi-grid-item--xs {
                width: 30%;
                max-width: 140px;
            }
        }
        @media (min-width: 1280px) {
            .wi-grid-item.wi-grid-item--xs {
                width: 28%;
                max-width: 160px;
            }
        }

        .wi-grid-item.wi-grid-item--s {
            max-width: min(100%, 240px);
            aspect-ratio: 3 / 4;
        }
        @media (min-width: 768px) {
            .wi-grid-item.wi-grid-item--s {
                width: 34%;
                max-width: 170px;
            }
        }
        @media (min-width: 1280px) {
            .wi-grid-item.wi-grid-item--s {
                width: 32%;
                max-width: 190px;
            }
        }

        .wi-grid-item.wi-grid-item--l {
            max-width: min(100%, 320px);
            aspect-ratio: 4 / 5;
        }
        @media (min-width: 768px) {
            .wi-grid-item.wi-grid-item--l {
                width: 46%;
                max-width: 240px;
            }
        }
        @media (min-width: 1280px) {
            .wi-grid-item.wi-grid-item--l {
                width: 44%;
                max-width: 268px;
            }
        }

        .wi-grid-item.wi-grid-item--xl {
            max-width: min(100%, 360px);
            aspect-ratio: 3 / 4;
        }
        @media (min-width: 768px) {
            .wi-grid-item.wi-grid-item--xl {
                width: 52%;
                max-width: 280px;
            }
        }
        @media (min-width: 1280px) {
            .wi-grid-item.wi-grid-item--xl {
                width: 50%;
                max-width: 300px;
            }
        }

        .wi-grid-item img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            transition: transform 0.75s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .wi-grid-item:hover img { transform: scale(1.03); }

        /* ─── 404 fallback ─── */
        #wi-not-found {
            display: none;
            position: fixed;
            inset: 0;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        #wi-not-found.is-visible { display: flex; }
    </style>

        const PROJECT_META = {
            Adria:       { description: 'Hair and movement study shot as a quiet, cinematic portrait series.', year: 2023 },
            BVLGARI:     { description: 'Jewellery-led editorial with sculptural light and restrained styling.', year: 2024 },
            BoyZ:        { description: 'Tight headshot series exploring texture, skin, and minimal gesture.', year: 2023 },
            Cont:        { description: 'Surreal silhouettes and soft distortion for a dreamlike fashion story.', year: 2025 },
            Crystaline:  { description: 'Macro product stills with crisp edges and a cool, glass-like palette.', year: 2024 },
            Darling:     { description: 'Accessory-focused frames with soft shadows and tactile leather detail.', year: 2023 },
            Jawali:      { description: 'High-contrast studio portraits with strong shoulders and calm posture.', year: 2025 },
            Malx:        { description: 'Ethereal volumes and soft fog for a slow, otherworldly editorial.', year: 2024 },
            'Maskz_||':  { description: 'Textile-forward portraits with surreal masking and layered texture.', year: 2026 },
            Mskz:        { description: 'Futuristic queen narrative with frontal symmetry and metallic light.', year: 2025 },
            NS:          { description: 'Dance-floor energy captured mid-motion with long limbs and heat.', year: 2025 },
            Nike:        { description: 'Athletic elegance with sculptural shadow and confident stillness.', year: 2024 },
            Red:         { description: 'Ornate face studies with warm tones and a deliberate, slow rhythm.', year: 2023 },
            Vogue_Rwanda:{ description: 'Editorial mix of portrait and detail for a bold, contemporary spread.', year: 2026 },
        };

        // ─── Find project ───
        const baseProject = PROJECTS.find(function (p) { return p.slug === slug; });
        const extra = baseProject ? PROJECT_META[baseProject.slug] : null;
        const project = baseProject && extra ? Object.assign({}, baseProject, extra) : baseProject;

        const imgEl         = document.getElementById('wi-img');
        const stageEl       = document.getElementById('wi-stage');
        const gridEl        = document.getElementById('wi-grid');
        const toggleBtn     = document.getElementById('wi-view-toggle');
        const cursorEl      = document.getElementById('work-cursor');
        const dotCursor     = document.getElementById('grid-cursor');
        const counterEl     = document.getElementById('wi-counter');
        const metaTitleEl   = document.getElementById('wi-project-title');
        const metaDescEl    = document.getElementById('wi-project-desc');
        const metaYearEl    = document.getElementById('wi-project-year');
        const notFoundEl    = document.getElementById('wi-not-found');

        if (!project || project.images.length === 0) {
            document.title = 'BHUMI | Not Found';
            if (notFoundEl) notFoundEl.classList.add('is-visible');
            if (imgEl) imgEl.style.display = 'none';
            var chromeEl = document.getElementById('wi-single-chrome');
            if (chromeEl) chromeEl.style.display = 'none';
            return;
        }

        const images = project.images;
        const total  = images.length;
        let current  = 0;
        let isGrid   = false;

        document.title = 'BHUMI | ' + project.title + ' · ' + project.year;

        // ─── Helpers ───
        function pad(n) { return String(n).padStart(2, '0'); }

        function updateChrome() {
            if (metaTitleEl) metaTitleEl.textContent = project.title.toUpperCase();
            if (metaDescEl)  metaDescEl.textContent  = project.description;
            if (metaYearEl)  metaYearEl.textContent  = String(project.year);
            if (counterEl)   counterEl.textContent   = pad(current + 1) + ' — ' + pad(total);
            if (toggleBtn) {
                toggleBtn.textContent = 'Grid';
                toggleBtn.setAttribute('aria-pressed', 'false');
            }
        }

        function showImage(index, instant) {
            if (!imgEl) return;
            if (instant) {
                imgEl.src = images[index];
            } else {
                imgEl.classList.add('is-fading');
                setTimeout(() => {
                    imgEl.src = images[index];
                    imgEl.classList.remove('is-fading');
                }, 300);
            }
        }

        function preload(index) {
            if (index >= 0 && index < total) {
                const img = new Image();
                img.src = images[index];
            }
        }

        // ─── Build grid — varied tile scales (matches work page frame rhythm) ───
        var WI_GRID_FRAME_CLASSES = [
            'wi-grid-item--xs', 'wi-grid-item--xl', '', 'wi-grid-item--l',
            'wi-grid-item--s', 'wi-grid-item--xl', 'wi-grid-item--l', 'wi-grid-item--xs',
            '', 'wi-grid-item--s', 'wi-grid-item--xl', 'wi-grid-item--l', 'wi-grid-item--s'
        ];

        function buildGrid() {
            if (!gridEl) return;

            if (gridEl.childElementCount > 0) return;

            images.forEach(function (src, i) {
                var item = document.createElement('div');
                var frameExtra = WI_GRID_FRAME_CLASSES[i % WI_GRID_FRAME_CLASSES.length];
                item.className = frameExtra ? 'wi-grid-item ' + frameExtra : 'wi-grid-item';
                item.setAttribute('role', 'button');
                item.setAttribute('tabindex', '0');
                item.setAttribute('aria-label', 'Open image ' + (i + 1));

                var img = document.createElement('img');
                img.src = src;
                img.alt = '';
                img.loading = 'lazy';
                img.decoding = 'async';

                item.appendChild(img);
                gridEl.appendChild(item);

                item.addEventListener('click', function () {
                    current = i;
                    showImage(current, true);
                    preload(current + 1);
                    enterSingleView();
                });
                item.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); item.click(); }
                });
            });
        }

        // ─── View switching ───
        function enterGridView() {
            isGrid = true;
            document.body.classList.add('grid-mode');
            buildGrid();
            updateChrome();
            window.scrollTo(0, 0);
        }

        function enterSingleView() {
            isGrid = false;
            document.body.classList.remove('grid-mode');
            updateChrome();
        }

        // Initial render
        showImage(0, true);
        updateChrome();
        preload(1);

        // ─── Grid button (single view only — hidden in grid mode) ───
        if (toggleBtn) {
            toggleBtn.addEventListener('click', function () {
                if (!isGrid) enterGridView();
            });
        }

        // ─── Single-view navigation ───
        function goNext() {
            if (current < total - 1) { current++; showImage(current, false); preload(current + 1); updateChrome(); }
        }
        function goPrev() {
            if (current > 0) { current--; showImage(current, false); preload(current - 1); updateChrome(); }
        }

        // ─── Cursor tracking ───
        let cursorX = 0, cursorY = 0, isLeft = false, rafPending = false;

        document.addEventListener('mousemove', function (e) {
            cursorX = e.clientX;
            cursorY = e.clientY;
            isLeft  = e.clientX < window.innerWidth / 2;

            if (!rafPending) {
                rafPending = true;
                requestAnimationFrame(function () {
                    rafPending = false;
                    if (cursorEl) {
                        cursorEl.style.left = cursorX + 'px';
                        cursorEl.style.top  = cursorY + 'px';
                        cursorEl.textContent = isLeft ? '←' : '→';
                        const atEdge = (isLeft && current === 0) || (!isLeft && current === total - 1);
                        cursorEl.style.opacity = isGrid ? '0' : (atEdge ? '0.25' : '1');
                    }
                    if (dotCursor) {
                        dotCursor.style.left = cursorX + 'px';
                        dotCursor.style.top  = cursorY + 'px';
                    }
                });
            }
        });

        document.addEventListener('mouseleave', function () {
            if (cursorEl)  cursorEl.style.opacity  = '0';
            if (dotCursor) dotCursor.style.opacity = '0';
        });
        document.addEventListener('mouseenter', function () {
            if (cursorEl && !isGrid)  cursorEl.style.opacity  = '1';
            if (dotCursor && isGrid)  dotCursor.style.opacity = '1';
        });

        // ─── Click navigation (single view only) ───
        document.addEventListener('click', function (e) {
            if (isGrid) return;
            if (e.target && (e.target.closest('a') || e.target.closest('button'))) return;
            if (isLeft) goPrev(); else goNext();
        });

        // ─── Keyboard ───
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') {
                if (isGrid) enterSingleView(); else window.location.href = 'work.html';
            }
            if (!isGrid) {
                if (e.key === 'ArrowRight' || e.key === 'ArrowUp')   goNext();
                if (e.key === 'ArrowLeft'  || e.key === 'ArrowDown') goPrev();
            }
        });

        // ─── Touch / swipe (single view) ───
        let touchStartX = 0;
        document.addEventListener('touchstart', function (e) {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });
        document.addEventListener('touchend', function (e) {
            if (isGrid) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 40) {
                if (dx < 0) goNext(); else goPrev();
            }
        }, { passive: true });

    }());
